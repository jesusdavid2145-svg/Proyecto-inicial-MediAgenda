<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear cuenta - MediAgenda</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <main class="form-container">
        <section class="form-card">
            <h1>Crear cuenta</h1>
            <p class="subtitle">Registra tus datos para acceder a MediAgenda</p>

            <form id="registroForm">
                <label for="tipoDocumento">Tipo de documento</label>
                <select id="tipoDocumento">
                    <option value="">Seleccione</option>
                    <option value="CC">Cédula de ciudadanía</option>
                    <option value="TI">Tarjeta de identidad</option>
                    <option value="CE">Cédula de extranjería</option>
                </select>

                <label for="documento">Número de documento</label>
                <input type="text" id="documento" placeholder="Ingrese su documento">

                <label for="nombres">Nombres</label>
                <input type="text" id="nombres" placeholder="Ingrese sus nombres">

                <label for="apellidos">Apellidos</label>
                <input type="text" id="apellidos" placeholder="Ingrese sus apellidos">

                <label for="correoRegistro">Correo electrónico</label>
                <input type="email" id="correoRegistro" placeholder="Ingrese su correo">

                <label for="telefono">Teléfono</label>
                <input type="text" id="telefono" placeholder="Ingrese su teléfono">

                <label for="clave">Contraseña</label>
                <input type="password" id="clave" placeholder="Cree una contraseña">

                <label for="confirmarClave">Confirmar contraseña</label>
                <input type="password" id="confirmarClave" placeholder="Repita la contraseña">

                <div class="checkbox-group">
                    <input type="checkbox" id="terminos">
                    <label for="terminos">Acepto términos y condiciones</label>
                </div>

                <button type="submit">Crear cuenta</button>
            </form>

            <p class="help-text">
                ¿Ya tienes cuenta?
                <a href="index.html">Iniciar sesión</a>
            </p>
        </section>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
