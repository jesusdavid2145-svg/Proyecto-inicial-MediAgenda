<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediAgenda - Inicio de sesión</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page">

    <main class="login-container">
        <section class="login-card">
            <h1>MediAgenda</h1>
            <p class="subtitle">Sistema de gestión de citas médicas</p>

            <form id="loginForm">
                <label for="correo">Correo electrónico</label>
                <input type="email" id="correo" placeholder="Ingrese su correo">

                <label for="contrasena">Contraseña</label>
                <input type="password" id="contrasena" placeholder="Ingrese su contraseña">

                <button type="submit">Iniciar sesión</button>
            </form>

            <p class="help-text">
                ¿No tienes cuenta?
                <a href="registro.html">Crear cuenta</a>
            </p>

            <p class="help-text">
                ¿Necesitas ayuda?
                <a href="tutorial.html">Ver tutorial de uso</a>
            </p>
        </section>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
