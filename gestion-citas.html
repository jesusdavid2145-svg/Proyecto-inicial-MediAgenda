<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de citas - MediAgenda</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header class="main-header">
        <h1>Gestión de citas</h1>
        <p>Consulta, modifica o cancela tus citas médicas</p>
    </header>

    <main class="content-container">
        <section class="appointment-card">
            <h2>Consulta médica general</h2>
            <p><strong>Médico:</strong> Dra. Laura Gómez</p>
            <p><strong>Sede:</strong> Clínica Central</p>
            <p><strong>Modalidad:</strong> Presencial</p>
            <p><strong>Fecha:</strong> 15/05/2026</p>
            <p><strong>Hora:</strong> 09:00 a.m.</p>
            <p><strong>Estado:</strong> Programada</p>

            <div class="button-row">
                <button>Ver</button>
                <button>Modificar</button>
                <button class="danger" onclick="confirmarCancelacion()">Cancelar</button>
            </div>
        </section>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
